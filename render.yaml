services:
  - type: web
    name: crowd-fund-backend
    env: node
    region: singapore
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: UPI_ID
        value: dhruv95@fam
      - key: CORS_ORIGIN
        value: https://crowd-fund-zeta.vercel.app
      - key: ADMIN_SECRET_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true 