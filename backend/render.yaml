services:
  - type: web
    name: charity-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://your-frontend-url.vercel.app
      - key: PAYMENT_SECRET_KEY
        sync: false
      - key: PAYMENT_PUBLIC_KEY
        sync: false 